<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko" lang="ko">
<head>
<title>Generatore di QrCode</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
 <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js">
</script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js">
</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
</script>

<script type="text/javascript" src="qrcode.js"></script>
</head>
<body>
<style>
.qr{
	width:215px; 
	height:215px; 
	margin-top:15px; 
	border:solid 2px black; 
	border-radius:5px;
    padding: 5px;
}
.titolo{
	text-align: center;
    background: #ffa500;
    border-radius: 5px;
    width: 50%;
    margin-left: 25%;
}
</style>

<div class='col-xs-12'>
<h4>Generatore di QrCode</h4>
<button class='btn btn-primary' onclick='agg()'>AGG</button>

<button class='btn btn-warning' onclick='pQrDaText()'>QrCodes da textarea</button>

<button onclick='pulisci();' class='btn btn-danger'>Pulisci</button>
</div>
<div id="divElencoQrCodes" class='col-xs-12 '>

</div>

<div class='col-xs-12 '>
<textarea id='txta' class='form-control' rows=10  >

</textarea>
</div>


<script type="text/javascript">
function pulisci(){$('#divElencoQrCodes').html(''); $('#txta').val('');}
function agg(k = 0){
	let i = $('.qr').length;
	i += 1;
	if(k == 0){
		k = i;
	}
	let s = sHTML.replace('$i$', k).replace('$i$', k).replace('$i$', k).replace('$i$', k);
	$('#divElencoQrCodes').append(s);
}

function makeCode (i) {		
	var elText = document.getElementById("text_" + i);
	
	if (!elText.value) {
		alert("Input a text");
		elText.focus();
		return;
	}
	
	document.getElementById("qrcode_" + i).innerHTML = ''
	
	var qrcode = new QRCode(document.getElementById("qrcode_" + i), {
		width : 200,
		height : 200
	});
	qrcode.makeCode(elText.value);
}

function pQrDaText(){
	let i = 0;
	$('#txta').val().trim().replaceAll("\t", "===").replaceAll("\n", "===").replaceAll(" ", "===").split("===").forEach(function (item) {
		if(item != ''){
			i+=1;
			
			
			let qrCode_Codice = '';
			let qrCode_Descr = '';
			let s = item.split('-');
			if(s.length == 1){
				qrCode_Codice = s[0];
				qrCode_Descr = s[0];
			}else{
				qrCode_Codice = s[0];
				qrCode_Descr = s[1];
			}
			
			if(qrCode_Codice == '0000'){					
				$('#divElencoQrCodes').append('<div class="col-xs-12" style="border-top:solid 3px black; margin-top:10px;"><h2 class="titolo">'+qrCode_Descr+'</h2></div>');
				console.log(qrCode_Descr)
			}else{
				agg(i);
				$('#text_' + i).val(qrCode_Codice);	
				$('#lbl_' + i).html(qrCode_Descr);	
				makeCode(i);
			}			
						
		}  
	});
}
 
 const sHTML = `	<div class='col-xs-12 col-sm-6 col-md-4 col-lg-3' style='padding-top:10px;'>
		<input id="text_$i$" type="text" class="form-control" style="width:220px; font-weight:bold; font-size: 20px;" onchange="makeCode($i$)"/> 
		<div id="qrcode_$i$" class="qr"></div>
		<label id='lbl_$i$'></label>
	</div>`
</script>
</body>
